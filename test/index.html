<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robofest 2.0</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-header">
        <h1>Robofest 2.0</h1>
        <p>In collaboration with</p>
        <h3>SRM Directorate of Sports</h3>
      </div>

      <div class="animated-icons">
        <div class="animated-icon icon-1">
          <img src="/public/images/hero-svgs/gear.svg" alt="Robot 1" />
        </div>
        <div class="animated-icon icon-2">
          <img src="/public/images/hero-svgs/robo.svg" alt="Robot 1" />
        </div>
        <div class="animated-icon icon-3">
          <img src="/public/images/hero-svgs/microchip.svg" alt="Robot 1" />
        </div>
        <div class="animated-icon icon-4">
          <img src="/public/images/hero-svgs/rocket.svg" alt="Robot 1" />
        </div>
        <div class="animated-icon icon-5">
          <img src="/public/images/hero-svgs/wrench.svg" alt="Robot 1" />
        </div>
      </div>

      <h1 class="animated-text">
        <div class="placeholder-icon"></div>
        <span class="text-segment">Build the future</span>

        <div class="placeholder-icon"></div>
        <span class="text-segment">compete with precision.</span>

        <span class="text-segment">Push your limits </span>

        <div class="placeholder-icon"></div>
        <span class="text-segment">in robotics</span>

        <div class="placeholder-icon"></div>
        <span class="text-segment">innovation and speed</span>

        <div class="placeholder-icon"></div>
        <span class="text-segment">at Robofest.</span>
      </h1>
    </section>

    <section class="outro"></section>
    <script type="module" src="./sample.js"></script>
  </body>
</html>
