<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Robofest Website Launch</title>
		<style>
			@font-face {
				font-family: "AwesomeSerifVAR";
				src:
					url("/fonts/AwesomeSerifVAR.ttf") format("truetype"),
					url("../public/fonts/AwesomeSerifVAR.ttf") format("truetype");
				font-weight: 100 900;
				font-style: normal;
				font-display: swap;
			}

			@font-face {
				font-family: "AwesomeSerifItalic";
				src:
					url("/fonts/AwesomeSerifItalicVAR.ttf") format("truetype"),
					url("../public/fonts/AwesomeSerifItalicVAR.ttf") format("truetype");
				font-weight: 100 900;
				font-style: italic;
				font-display: swap;
			}

			@font-face {
				font-family: "SpaceGroteskReg";
				src:
					url("/fonts/SpaceGrotesk-Regular.woff2") format("woff2"),
					url("../public/fonts/SpaceGrotesk-Regular.woff2") format("woff2");
				font-weight: 400;
				font-style: normal;
				font-display: swap;
			}

			@font-face {
				font-family: "SpaceGroteskMed";
				src:
					url("/fonts/SpaceGrotesk-Medium.woff2") format("woff2"),
					url("../public/fonts/SpaceGrotesk-Medium.woff2") format("woff2");
				font-weight: 500;
				font-style: normal;
				font-display: swap;
			}

			:root {
				color-scheme: dark;
				--bg: #0d0e10;
				--panel: rgba(22, 23, 26, 0.78);
				--panel-strong: rgba(18, 19, 22, 0.92);
				--text: #f4f1ea;
				--muted: rgba(244, 241, 234, 0.7);
				--gold: #ffb84d;
				--amber: #dc493a;
				--cream: #e8e0d0;
				--line: rgba(255, 255, 255, 0.1);
				--shadow: 0 26px 80px rgba(0, 0, 0, 0.45);
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				width: 100%;
				min-height: 100%;
				overflow-x: hidden;
				background:
					radial-gradient(circle at top, rgba(255, 184, 77, 0.16), transparent 38%),
					radial-gradient(circle at 20% 20%, rgba(220, 73, 58, 0.22), transparent 28%),
					linear-gradient(180deg, #111214 0%, #090a0b 100%);
				color: var(--text);
				font-family: "SpaceGroteskReg", Arial, Helvetica, sans-serif;
			}

			body {
				position: relative;
				min-height: 100vh;
			}

			body::before,
			body::after {
				content: "";
				position: fixed;
				inset: 0;
				pointer-events: none;
			}

			body::before {
				background-image:
					linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
					linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
				background-size: 48px 48px;
				mask-image: radial-gradient(circle at 50% 35%, black 42%, transparent 82%);
				opacity: 0.65;
			}

			body::after {
				background:
					radial-gradient(circle at 12% 18%, rgba(255, 184, 77, 0.18), transparent 18%),
					radial-gradient(circle at 88% 14%, rgba(255, 255, 255, 0.08), transparent 14%),
					radial-gradient(circle at 80% 88%, rgba(220, 73, 58, 0.18), transparent 20%);
				filter: blur(8px);
			}

			.launch-app {
				position: relative;
				min-height: 100vh;
				padding: 24px;
				display: grid;
				place-items: center;
			}

			.launch-shell {
				width: min(920px, 100%);
				display: grid;
				gap: 22px;
			}

			.launch-stage,
			.ceremony-stage {
				position: relative;
				overflow: hidden;
				border: 1px solid var(--line);
				border-radius: 28px;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 40%), var(--panel);
				box-shadow: var(--shadow);
				backdrop-filter: blur(18px);
				text-align: center;
				justify-items: center;
			}

			.launch-stage {
				display: grid;
				gap: 24px;
				align-items: center;
				padding: clamp(24px, 4vw, 44px);
			}

			.eyebrow {
				margin: 0 0 12px;
				color: rgba(255, 255, 255, 0.8);
				letter-spacing: 0.14em;
				text-transform: uppercase;
				font-size: 0.78rem;
				font-weight: 700;
			}

			h1,
			h2 {
				margin: 0;
			}

			.launch-title {
				font-family: "AwesomeSerifVAR", Georgia, serif;
				font-size: clamp(2.7rem, 7vw, 6rem);
				line-height: 0.96;
				letter-spacing: -0.03em;
				background: linear-gradient(120deg, #ffffff 0%, #ffe8d6 28%, #ffb84d 64%, #ffffff 100%);
				-webkit-background-clip: text;
				background-clip: text;
				color: transparent;
				-webkit-text-fill-color: transparent;
			}

			.countdown-panel {
				display: grid;
				gap: 16px;
				padding: 22px;
				border-radius: 22px;
				background: rgba(9, 10, 11, 0.4);
				border: 1px solid rgba(255, 255, 255, 0.08);
			}

			.countdown-grid {
				display: grid;
				grid-template-columns: repeat(3, minmax(0, 1fr));
				gap: 10px;
			}

			.countdown-grid.is-hidden {
				display: none;
			}

			.count-box {
				padding: 14px 12px;
				border-radius: 18px;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
				border: 1px solid rgba(255, 255, 255, 0.08);
				text-align: center;
			}

			.count-number {
				display: block;
				font-family: "AwesomeSerifVAR", Georgia, serif;
				font-size: clamp(2rem, 6vw, 3.8rem);
				line-height: 1;
			}

			.count-label {
				display: block;
				margin-top: 6px;
				color: rgba(255, 255, 255, 0.65);
				font-size: 0.76rem;
				letter-spacing: 0.14em;
				text-transform: uppercase;
			}

			.launch-actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				align-items: center;
				justify-content: center;
			}

			.launch-actions--stacked {
				flex-direction: column;
			}

			.launch-button,
			.guest-button,
			.reset-button,
			.enter-site-button {
				appearance: none;
				border: 0;
				cursor: pointer;
				transition:
					transform 0.2s ease,
					opacity 0.2s ease,
					box-shadow 0.2s ease,
					background 0.2s ease;
				font-family: "SpaceGroteskMed", Arial, sans-serif;
			}

			.launch-button,
			.enter-site-button {
				min-height: 52px;
				padding: 0 22px;
				border-radius: 999px;
				font-size: 0.95rem;
				font-weight: 700;
				letter-spacing: 0.03em;
				color: #0d0e10;
				background: linear-gradient(135deg, #ffffff 0%, #ffe7c4 40%, #ffb84d 100%);
				box-shadow: 0 14px 35px rgba(255, 184, 77, 0.28);
			}

			.launch-button {
				position: relative;
				width: min(72vw, 270px);
				height: min(72vw, 270px);
				padding: 0;
				border-radius: 50%;
				font-family: "SpaceGroteskBold", Arial, sans-serif;
				font-size: clamp(1rem, 2.5vw, 1.4rem);
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: #4d0707;
				background:
					radial-gradient(circle at 33% 28%, rgba(255, 255, 255, 0.3), transparent 18%),
					radial-gradient(circle at center, #ff4f4f 0%, #e82222 52%, #b10f0f 100%);
				box-shadow:
					0 22px 48px rgba(0, 0, 0, 0.45),
					inset 0 2px 2px rgba(255, 255, 255, 0.24),
					inset 0 -16px 24px rgba(0, 0, 0, 0.16);
				border: 14px solid #f2db16;
				outline: 4px solid rgba(0, 0, 0, 0.45);
				outline-offset: 4px;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				transform: translateZ(0);
			}

			.launch-button::before {
				content: "";
				position: absolute;
				inset: 14px;
				border-radius: 50%;
				border: 1px solid rgba(255, 255, 255, 0.18);
				box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.2);
			}

			.launch-button span {
				position: relative;
				z-index: 1;
				transform: translateY(1px);
			}

			.launch-button:hover,
			.guest-button:hover,
			.reset-button:hover {
				transform: translateY(-2px);
			}

			.launch-button:disabled {
				cursor: wait;
				opacity: 0.55;
				box-shadow: none;
			}

			.launch-stage.is-hidden,
			.ceremony-stage.is-hidden {
				display: none;
			}

			.ceremony-stage {
				display: grid;
				gap: 22px;
				padding: clamp(20px, 3.4vw, 34px);
				justify-items: center;
			}

			.ceremony-header {
				display: flex;
				flex-wrap: wrap;
				align-items: end;
				justify-content: center;
				gap: 12px;
			}

			.ceremony-title {
				font-family: "AwesomeSerifVAR", Georgia, serif;
				font-size: clamp(1.9rem, 4vw, 3.2rem);
				line-height: 1;
				background: linear-gradient(120deg, #ffffff 0%, #ffe8d6 30%, #ffb84d 68%, #ffffff 100%);
				-webkit-background-clip: text;
				background-clip: text;
				color: transparent;
				-webkit-text-fill-color: transparent;
			}

			.ceremony-layout {
				display: grid;
				gap: 20px;
				align-items: center;
				justify-items: center;
				width: 100%;
			}

			.lamp-frame {
				position: relative;
				padding: 24px;
				border-radius: 24px;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
				border: 1px solid rgba(255, 255, 255, 0.08);
				width: min(100%, 680px);
			}

			.lamp-frame::before {
				content: "";
				position: absolute;
				inset: 10% 12%;
				border-radius: 999px;
				background: radial-gradient(circle, rgba(255, 184, 77, 0.18), transparent 70%);
				filter: blur(18px);
				pointer-events: none;
			}

			.lamp-image {
				position: relative;
				z-index: 1;
				display: block;
				width: 100%;
				height: min(72vw, 620px);
				object-fit: contain;
				margin: 0 auto;
			}

			.guest-button,
			.reset-button,
			.tap-note {
				min-height: 50px;
				border-radius: 16px;
				padding: 0 16px;
				font-size: 0.95rem;
			}

			.reset-button {
				color: #141414;
				background: linear-gradient(135deg, #f2eadc, #d9ccb4);
			}

			.tap-note {
				display: flex;
				align-items: center;
				justify-content: center;
				text-align: center;
				border-radius: 16px;
				border: 1px dashed rgba(255, 255, 255, 0.16);
				color: rgba(255, 255, 255, 0.84);
				background: rgba(255, 255, 255, 0.03);
			}

			.launch-footer {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				align-items: center;
				justify-content: space-between;
				justify-content: center;
			}

			.confetti-layer {
				position: fixed;
				inset: 0;
				pointer-events: none;
				overflow: hidden;
				z-index: 20;
			}

			.confetti-piece {
				position: absolute;
				top: -12px;
				left: 0;
				width: var(--w, 10px);
				height: var(--h, 16px);
				border-radius: 2px;
				background: var(--c, #fff);
				opacity: 0.98;
				transform: translate3d(0, 0, 0) rotate(0deg);
				animation: confetti-fall var(--dur, 2400ms) cubic-bezier(0.2, 0.6, 0.2, 1) forwards;
			}

			.launch-orb {
				position: absolute;
				border-radius: 999px;
				background: radial-gradient(circle, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0));
				filter: blur(1px);
				animation: float-orb linear infinite;
				opacity: 0.7;
			}

			.launch-orb.one {
				width: 18px;
				height: 18px;
				top: 14%;
				left: 8%;
				animation-duration: 18s;
			}

			.launch-orb.two {
				width: 26px;
				height: 26px;
				top: 24%;
				right: 12%;
				animation-duration: 22s;
			}

			.launch-orb.three {
				width: 12px;
				height: 12px;
				bottom: 16%;
				left: 14%;
				animation-duration: 16s;
			}

			.launch-orb.four {
				width: 14px;
				height: 14px;
				bottom: 20%;
				right: 20%;
				animation-duration: 20s;
			}

			@keyframes confetti-fall {
				0% {
					transform: translate3d(var(--x, 0), -14vh, 0) rotate(0deg) scale(1);
				}
				100% {
					transform: translate3d(calc(var(--x, 0) + var(--drift, 0px)), 112vh, 0)
						rotate(var(--rot, 540deg)) scale(0.9);
				}
			}

			@keyframes float-orb {
				0%,
				100% {
					transform: translate3d(0, 0, 0) scale(1);
				}
				50% {
					transform: translate3d(0, -14px, 0) scale(1.14);
				}
			}

			@media (max-width: 900px) {
				.launch-title {
					font-size: clamp(2.4rem, 12vw, 4.4rem);
				}

				.lamp-frame {
					width: min(100%, 560px);
				}
			}

			@media (max-width: 640px) {
				.launch-app {
					padding: 14px;
				}

				.launch-stage,
				.ceremony-stage {
					border-radius: 22px;
					padding: 18px;
				}

				.countdown-grid,
				.guest-grid {
					grid-template-columns: repeat(2, minmax(0, 1fr));
				}

				.launch-actions,
				.launch-footer {
					flex-direction: column;
					align-items: stretch;
				}

				.launch-button,
				.guest-button,
				.reset-button {
					width: 100%;
					justify-content: center;
				}

				.lamp-image {
					height: min(82vw, 520px);
				}
			}
		</style>
	</head>
	<body>
		<div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

		<main class="launch-app">
			<div class="launch-shell">
				<section class="launch-stage" id="launchStage">
					<div>
						<h1 class="launch-title">Robofest Website Launch</h1>

						<div class="countdown-panel" style="margin-top: 22px;">
							<div class="launch-actions launch-actions--stacked" style="justify-content: center;">
								<button class="launch-button" id="launchButton" type="button" aria-label="Start the website launch"></button>
							</div>
							<div class="countdown-grid is-hidden" id="countdownGrid" aria-label="Countdown timer">
								<div class="count-box"><span class="count-number" id="countHours">00</span><span class="count-label">Hours</span></div>
								<div class="count-box"><span class="count-number" id="countMinutes">00</span><span class="count-label">Minutes</span></div>
								<div class="count-box"><span class="count-number" id="countSeconds">00</span><span class="count-label">Seconds</span></div>
							</div>

						</div>
				</section>

				<section class="ceremony-stage is-hidden" id="ceremonyStage" aria-live="polite">
					<div class="ceremony-header">
						<div>
							<h2 class="ceremony-title">Lighting of Virtual Kuthuvilakku</h2>
						</div>
					</div>

					<div class="ceremony-layout">
						<div class="lamp-frame">
							<img id="lampImage" class="lamp-image" src="l1.png" alt="Virtual kuthuvilakku" />
						</div>

						<div class="launch-card">
							<div class="countdown-panel">
								<div class="launch-footer">
									<button class="reset-button" id="resetButton" type="button">Reset lamp</button>
								</div>
							</div>
						</div>
					</div>
				</section>
			</div>
		</main>

		<script>
			(function () {
				const launchStage = document.getElementById("launchStage");
				const ceremonyStage = document.getElementById("ceremonyStage");
				const lampImage = document.getElementById("lampImage");
				const launchButton = document.getElementById("launchButton");
				const resetButton = document.getElementById("resetButton");
				const countdownGrid = document.getElementById("countdownGrid");
				const countHours = document.getElementById("countHours");
				const countMinutes = document.getElementById("countMinutes");
				const countSeconds = document.getElementById("countSeconds");
				const confettiLayer = document.getElementById("confettiLayer");
				const lampStates = ["l1.png", "l2.png", "l3.png", "l4.png", "l5.png"];

				let launchTimer = null;
				let launchRemainingSeconds = 5;
				let launchTriggered = false;
				let ceremonyStep = 0;
				let redirectTimer = null;

				function pad(number) {
					return String(Math.max(0, Math.floor(number))).padStart(2, "0");
				}

				function updateCountdown() {
					const remaining = Math.max(0, launchRemainingSeconds);
					const hours = 0;
					const minutes = 0;
					const seconds = remaining;

					countHours.textContent = pad(hours);
					countMinutes.textContent = pad(minutes);
					countSeconds.textContent = pad(seconds);

					if (remaining === 0) {
						launchButton.disabled = true;
						launchButton.textContent = "Launching";
						if (launchTimer) {
							window.clearInterval(launchTimer);
							launchTimer = null;
						}
						window.setTimeout(revealCeremony, 650);
						return;
					}

					launchButton.disabled = true;
					launchButton.textContent = "Launch in " + pad(seconds) + "s";
				}

				function tickLaunchCountdown() {
					updateCountdown();

					if (launchRemainingSeconds <= 0) {
						launchTimer = null;
						window.setTimeout(revealCeremony, 650);
						return;
					}

					launchRemainingSeconds -= 1;
					launchTimer = window.setTimeout(tickLaunchCountdown, 1000);
				}

				function burstConfetti(amount) {
					const colors = ["#ffffff", "#ffb84d", "#dc493a", "#e8e0d0", "#ffd369"];
					const pieces = Math.max(20, amount || 60);

					for (let index = 0; index < pieces; index += 1) {
						const piece = document.createElement("span");
						const size = 8 + Math.random() * 10;
						const drift = (Math.random() * 220 - 110).toFixed(0) + "px";
						const x = (Math.random() * 100).toFixed(2) + "vw";
						const duration = 1800 + Math.random() * 1700;
						const delay = Math.random() * 220;

						piece.className = "confetti-piece";
						piece.style.left = x;
						piece.style.setProperty("--x", "0px");
						piece.style.setProperty("--drift", drift);
						piece.style.setProperty("--rot", (360 + Math.random() * 900).toFixed(0) + "deg");
						piece.style.setProperty("--dur", duration.toFixed(0) + "ms");
						piece.style.setProperty("--w", size.toFixed(0) + "px");
						piece.style.setProperty("--h", (size * (0.7 + Math.random() * 0.8)).toFixed(0) + "px");
						piece.style.background = colors[Math.floor(Math.random() * colors.length)];
						piece.style.animationDelay = delay.toFixed(0) + "ms";
						piece.style.transform = "rotate(" + (Math.random() * 180).toFixed(0) + "deg)";

						confettiLayer.appendChild(piece);
						window.setTimeout(() => piece.remove(), duration + delay + 120);
					}
				}

				async function scheduleWebsiteLoad() {
					if (redirectTimer) {
						return;
					}

					burstConfetti(100);

					try {
						await fetch("/api/launch/complete", {
							method: "POST",
							cache: "no-store",
							keepalive: true,
						});
					} catch {
						// Even if the flag update fails, continue with navigation.
					}

					redirectTimer = window.setTimeout(() => {
						window.location.href = "/";
					}, 1300);
				}

				function advanceCeremony() {
					if (!launchTriggered || ceremonyStep >= lampStates.length - 1 || redirectTimer) {
						return;
					}

					ceremonyStep += 1;
					lampImage.src = lampStates[ceremonyStep];
					burstConfetti(28 + ceremonyStep * 8);

					if (ceremonyStep === lampStates.length - 1) {
						scheduleWebsiteLoad();
					}
				}

				function resetCeremony() {
					if (redirectTimer) {
						window.clearTimeout(redirectTimer);
						redirectTimer = null;
					}

					ceremonyStep = 0;
					lampImage.src = lampStates[0];
				}

				function startLaunchSequence() {
					if (launchTimer || launchTriggered) {
						return;
					}

					launchRemainingSeconds = 5;
					countdownGrid.classList.remove("is-hidden");
					launchButton.disabled = true;
					launchButton.textContent = "Launch in 5s";
					burstConfetti(24);
					tickLaunchCountdown();
				}

				function revealCeremony() {
					if (launchTriggered) {
						return;
					}

					launchTriggered = true;
					ceremonyStep = 0;
					lampImage.src = lampStates[0];
					burstConfetti(90);
					launchStage.classList.add("is-hidden");
					ceremonyStage.classList.remove("is-hidden");
					burstConfetti(40);
					setTimeout(() => burstConfetti(28), 500);
				}

				launchButton.addEventListener("click", startLaunchSequence);
				ceremonyStage.addEventListener("click", (event) => {
					if (event.target.closest("button")) {
						return;
					}

					advanceCeremony();
				});
				resetButton.addEventListener("click", () => {
					resetCeremony();
				});

				countdownGrid.classList.add("is-hidden");
			})();
		</script>
	</body>
</html>
